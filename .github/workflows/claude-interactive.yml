name: Claude Interactive

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    # Restrict to org members, owners, and explicitly granted collaborators
    # to prevent untrusted users from triggering a write-capable agent.
    if: |
      (github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains('OWNER,MEMBER,COLLABORATOR', github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        contains('OWNER,MEMBER,COLLABORATOR', github.event.comment.author_association)) ||
      (github.event_name == 'issues' &&
        contains(github.event.issue.body, '@claude') &&
        contains('OWNER,MEMBER,COLLABORATOR', github.event.issue.author_association)) ||
      (github.event_name == 'issues' &&
        github.event.action == 'assigned' &&
        contains(github.event.issue.body, '@claude') &&
        contains('OWNER,MEMBER,COLLABORATOR', github.event.issue.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: anthropics/claude-code-action@5f8e5bfe5b03891348854ae401476fc905a6ff6a # v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          trigger_phrase: "@claude"
          claude_args: >
            --model claude-sonnet-4-6
            --max-turns 15
            --allowedTools 'Edit,MultiEdit,Write,Read,Glob,Grep,LS,Bash(git:*),Bash(npm:*),Bash(yarn:*),Bash(npx:*),Bash(gh pr create:*),Bash(gh pr view:*),Bash(gh issue comment:*)'
